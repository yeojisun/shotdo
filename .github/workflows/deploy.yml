name: Deploy Vue to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'shotdo-web/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'shotdo-web/package-lock.json'

      - name: Install Dependencies
        run: |
          cd shotdo-web
          npm ci

      - name: Build Project
        run: |
          cd shotdo-web
          npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: shotdo-web/dist
          branch: gh-pages
          clean: true
